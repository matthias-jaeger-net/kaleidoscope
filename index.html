<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Gyro Kaleidoscope</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: black;
            }
            canvas {
                position: fixed;
                top: 0;
                left: 0;
            }
            #startBtn {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 20px 40px;
                font-size: 20px;
                background: white;
                border: none;
                border-radius: 10px;
            }
        </style>
    </head>
    <body>
        <video id="video" autoplay playsinline style="display: none"></video>
        <canvas id="canvas"></canvas>
        <button id="startBtn">Start Kaleidoscope</button>

        <script>
            const video = document.getElementById("video");
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            const startBtn = document.getElementById("startBtn");

            let rotation = 0;
            let slices = 12;
            let mirror = true;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resize);
            resize();

            // request camera
            async function startCamera() {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false,
                });
                video.srcObject = stream;
            }

            // request gyro
            function requestGyroPermission() {
                if (
                    typeof DeviceOrientationEvent !== "undefined" &&
                    typeof DeviceOrientationEvent.requestPermission ===
                        "function"
                ) {
                    DeviceOrientationEvent.requestPermission()
                        .then((response) => {
                            if (response === "granted") {
                                window.addEventListener(
                                    "deviceorientation",
                                    handleOrientation,
                                );
                            } else {
                                alert("Gyro permission denied!");
                            }
                        })
                        .catch(console.error);
                } else {
                    // older browsers
                    window.addEventListener(
                        "deviceorientation",
                        handleOrientation,
                    );
                }
            }

            function handleOrientation(event) {
                const gamma = event.gamma || 0;
                rotation = (gamma / 180) * Math.PI;
            }

            function drawKaleidoscope() {
                const w = canvas.width;
                const h = canvas.height;
                const size = Math.max(w, h);
                const angle = (Math.PI * 2) / slices;

                ctx.clearRect(0, 0, w, h);

                for (let i = 0; i < slices; i++) {
                    ctx.save();
                    ctx.translate(w / 2, h / 2);
                    ctx.rotate(rotation + i * angle);

                    if (mirror && i % 2 === 0) ctx.scale(1, -1);

                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, size, -angle / 2, angle / 2);
                    ctx.closePath();
                    ctx.clip();

                    ctx.drawImage(video, -size / 2, -size / 2, size, size);
                    ctx.restore();
                }

                requestAnimationFrame(drawKaleidoscope);
            }

            startBtn.addEventListener("click", async () => {
                startBtn.style.display = "none";
                await startCamera();
                requestGyroPermission();
                video.addEventListener("play", drawKaleidoscope);
            });
        </script>
    </body>
</html>
