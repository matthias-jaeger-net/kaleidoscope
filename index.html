<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Gyro Kaleidoscope</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: black;
            }
            canvas {
                position: fixed;
                top: 0;
                left: 0;
            }
            #startBtn {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 20px 40px;
                font-size: 20px;
                background: white;
                border: none;
                border-radius: 10px;
            }
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: black;
                font-family: system-ui;
            }

            canvas {
                position: fixed;
                top: 0;
                left: 0;
            }

            #startBtn {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 20px 40px;
                font-size: 20px;
                background: white;
                border: none;
                border-radius: 10px;
            }

            /* TOP BAR */

            #topbar {
                position: fixed;
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 15px;
                z-index: 10;
            }

            #topbar button {
                width: 55px;
                height: 55px;
                border-radius: 50%;
                border: none;
                font-size: 22px;
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            }
        </style>
    </head>
    <body>
        <div id="topbar">
            <button id="toggleBtn">🔁</button>
            <button id="wildBtn">🌪</button>
            <button id="splitBtn">🪞</button>
            <button id="cameraBtn">📷</button>
        </div>
        <video id="video" autoplay playsinline style="display: none"></video>
        <canvas id="canvas"></canvas>
        <button id="startBtn">Start Kaleidoscope</button>

        <script>
            const video = document.getElementById("video");
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            const startBtn = document.getElementById("startBtn");

            const toggleBtn = document.getElementById("toggleBtn");
            const wildBtn = document.getElementById("wildBtn");
            const splitBtn = document.getElementById("splitBtn");

            const cameraBtn = document.getElementById("cameraBtn");

            let facingMode = "environment";
            let stream = null;

            let rotation = 0;
            let slices = 12;
            let mirror = true;

            let mode = "kaleidoscope"; // kaleidoscope | split | off

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resize);
            resize();

            // camera
            async function startCamera() {
                if (stream) {
                    stream.getTracks().forEach((track) => track.stop());
                }

                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode },
                    audio: false,
                });

                video.srcObject = stream;
            }

            cameraBtn.onclick = async () => {
                facingMode =
                    facingMode === "environment" ? "user" : "environment";

                await startCamera();
            };

            // gyro
            function requestGyroPermission() {
                if (
                    typeof DeviceOrientationEvent !== "undefined" &&
                    typeof DeviceOrientationEvent.requestPermission ===
                        "function"
                ) {
                    DeviceOrientationEvent.requestPermission()
                        .then((response) => {
                            if (response === "granted") {
                                window.addEventListener(
                                    "deviceorientation",
                                    handleOrientation,
                                );
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener(
                        "deviceorientation",
                        handleOrientation,
                    );
                }
            }

            function handleOrientation(event) {
                const gamma = event.gamma || 0;
                rotation = (gamma / 180) * Math.PI;
            }

            // DRAW FUNCTIONS

            function drawSplit() {
                const w = canvas.width;
                const h = canvas.height;

                ctx.clearRect(0, 0, w, h);

                ctx.drawImage(video, 0, 0, w / 2, h);

                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(video, -w, 0, w / 2, h);
                ctx.restore();
            }

            function drawKaleidoscope() {
                const w = canvas.width;
                const h = canvas.height;
                const size = Math.max(w, h);
                const angle = (Math.PI * 2) / slices;

                ctx.clearRect(0, 0, w, h);

                for (let i = 0; i < slices; i++) {
                    ctx.save();

                    ctx.translate(w / 2, h / 2);
                    ctx.rotate(rotation + i * angle);

                    if (mirror && i % 2 === 0) ctx.scale(1, -1);

                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, size, -angle / 2, angle / 2);
                    ctx.closePath();
                    ctx.clip();

                    ctx.drawImage(video, -size / 2, -size / 2, size, size);

                    ctx.restore();
                }
            }

            function draw() {
                if (mode === "off") {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                }

                if (mode === "kaleidoscope") {
                    drawKaleidoscope();
                }

                if (mode === "split") {
                    drawSplit();
                }

                requestAnimationFrame(draw);
            }

            // BUTTON ACTIONS

            toggleBtn.onclick = () => {
                if (mode === "off") {
                    mode = "kaleidoscope";
                } else {
                    mode = "off";
                }
            };

            wildBtn.onclick = () => {
                mode = "kaleidoscope";
                slices = 32;
                mirror = true;
            };

            splitBtn.onclick = () => {
                mode = "split";
            };

            // START

            startBtn.addEventListener("click", async () => {
                startBtn.style.display = "none";

                await startCamera();

                requestGyroPermission();

                video.addEventListener("play", draw);
            });
        </script>
    </body>
</html>
